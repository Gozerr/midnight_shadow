<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Полуночная Тень — Улики</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="clues">
    <div class="rain"></div>
    <div class="backdrop"></div>
    <div class="crt"></div>
    <div class="wrap">
      <header class="topbar">
        <div>
          <p class="overline">Доска улик</p>
          <h1>Старый кабинет</h1>
        </div>
        <div class="timer-panel" aria-live="polite">
          <span id="timer-display">10:00:00</span>
          <button id="timer-toggle" class="button small" type="button">Пауза</button>
        </div>
      </header>

      <nav class="nav" aria-label="Разделы дела">
        <a class="nav-link" href="index.html">Главная</a>
        <a class="nav-link active" href="clues.html">Улики</a>
        <a class="nav-link" href="suspects.html">Подозреваемые</a>
        <a class="nav-link" href="journal.html">Журнал</a>
        <a class="nav-link" href="endings.html">Концовки</a>
      </nav>

      <main class="content">
        <section class="panel">
          <div class="section-head">
            <div>
              <p class="overline">Вещественные доказательства</p>
              <h2>Доска улик</h2>
            </div>
            <span id="clue-count" class="status-pill">0 открыто</span>
          </div>
          <p class="hint">Секретные материалы открываются паролями. Файлы указаны как прямые ссылки-заглушки, готовые к замене на Google Drive.</p>
          <div class="password-box">
            <label for="clue-password">Код материала</label>
            <input id="clue-password" type="text" autocomplete="off" placeholder="Введите найденный код" />
            <button id="unlock-clue" class="button" type="button">Добавить улику</button>
          </div>
          <div id="clues-list" class="evidence-board"></div>
        </section>
      </main>
    </div>

    <script defer src="js/gameData.js"></script>
    <script defer src="js/dialogues.js"></script>
    <script defer src="js/progress.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
