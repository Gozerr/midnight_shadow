<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Полуночная Тень — Журнал</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="journal">
    <div class="rain"></div>
    <div class="backdrop"></div>
    <div class="crt"></div>
    <div class="wrap">
      <header class="topbar">
        <div>
          <p class="overline">Журнал расследования</p>
          <h1>Записки следователя</h1>
        </div>
        <div class="timer-panel" aria-live="polite">
          <span id="timer-display">10:00:00</span>
          <button id="timer-toggle" class="button small" type="button">Пауза</button>
        </div>
      </header>

      <nav class="nav" aria-label="Разделы дела">
        <a class="nav-link" href="index.html">Главная</a>
        <a class="nav-link" href="clues.html">Улики</a>
        <a class="nav-link" href="suspects.html">Подозреваемые</a>
        <a class="nav-link active" href="journal.html">Журнал</a>
        <a class="nav-link" href="endings.html">Концовки</a>
      </nav>

      <main class="content two-column">
        <section class="panel">
          <div class="section-head">
            <div>
              <p class="overline">Развилки</p>
              <h2>Версия следствия</h2>
            </div>
            <span id="branch-status" class="status-pill">нет версии</span>
          </div>
          <div id="journal-choices" class="choice-list"></div>
        </section>
        <section class="panel">
          <p class="overline">Личные пометки</p>
          <h3>Новая запись</h3>
          <textarea id="note-input" rows="7" placeholder="Здесь можно оставить собственную мысль..."></textarea>
          <div class="button-row">
            <button id="save-note" class="button" type="button">Сохранить запись</button>
            <button id="reset-progress" class="button secondary" type="button">Сбросить прогресс</button>
          </div>
          <div id="journal-notes" class="note-list"></div>
        </section>
      </main>
    </div>

    <script src="js/data.js"></script>
    <script defer src="js/gameData.js"></script>
    <script defer src="js/dialogues.js"></script>
    <script defer src="js/progress.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
